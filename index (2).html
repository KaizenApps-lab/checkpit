function generateActionPlanPDF(items,totalInspections,period,tallerName){
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'l',unit:'mm',format:'a4'}); // landscape
    const W=297,H=210,M=12,CW=W-M*2;
    let y=0;
    const navy=[13,27,42],white=[255,255,255],dark=[15,23,42];
    const lgray=[241,245,249],border=[203,213,225],gray=[100,116,139];
    const green=[0,126,89],red=[184,24,24];
    const txt=(t,x,yy,opts={})=>doc.text(String(t),x,yy,opts);
    const setClr=(r,g,b)=>doc.setTextColor(r,g,b);
    const setFill=(r,g,b)=>doc.setFillColor(r,g,b);
    const setDraw=(r,g,b)=>doc.setDrawColor(r,g,b);

    // Cabecera
    setFill(...navy); doc.rect(0,0,W,18,'F');
    setClr(...white);
    doc.setFontSize(13); doc.setFont('helvetica','bold');
    txt('CheckPit — Informe de Observaciones y Planes de Acción',M,8);
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    txt(`${tallerName||'Red de Talleres'} · Período: ${period} · ${totalInspections} inspecciones analizadas · Generado: ${new Date().toLocaleDateString('es-CO')}`,M,14);
    y=24;

    // Cabecera de tabla
    const colW=[8,52,28,14,14,80,42,35]; // #|Observación|Posición|Frec|%|Acción correctiva|Responsable|Fecha compromiso
    const colX=[M];
    colW.forEach((w,i)=>{ if(i>0) colX.push(colX[i-1]+colW[i-1]); });
    const headers=['#','Observación detectada','Posición','Frec.','%','Acción correctiva propuesta','Responsable','Fecha compromiso'];

    setFill(...navy); doc.rect(M,y,CW,7,'F');
    headers.forEach((h,i)=>{
      setClr(...white); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
      txt(h,colX[i]+1.5,y+4.8);
    });
    y+=7;

    // Filas
    items.forEach((obs,idx)=>{
      const rowH=obs.action.length>80?14:10;
      if(y+rowH>H-M-10){doc.addPage();y=M;}
      const bg=idx%2===0?white:lgray;
      setFill(...bg); setDraw(...border);
      doc.rect(M,y,CW,rowH,'FD');

      const posRGB=[[124,58,237],[0,158,114],[169,108,7],[30,100,180],[10,98,140],[169,108,7]];
      const pc=posRGB[(obs.posId-1)%posRGB.length]||[100,116,139];

      // #
      setClr(...pc); doc.setFontSize(7); doc.setFont('helvetica','bold');
      txt(idx+1,colX[0]+colW[0]/2,y+rowH/2+1,{align:'center'});
      // Observación
      setClr(...dark); doc.setFontSize(7); doc.setFont('helvetica','normal');
      const obsLines=doc.splitTextToSize(obs.label,colW[1]-3);
      txt(obsLines.slice(0,2).join('\n'),colX[1]+1,y+3.5);
      // Posición
      setClr(...pc); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
      txt(doc.splitTextToSize(obs.posName,colW[2]-3)[0],colX[2]+1,y+rowH/2+1);
      // Frecuencia
      setClr(...red); doc.setFontSize(8); doc.setFont('helvetica','bold');
      txt(obs.n,colX[3]+colW[3]/2,y+rowH/2+1,{align:'center'});
      // %
      setClr(...gray); doc.setFontSize(7); doc.setFont('helvetica','normal');
      txt(obs.pct+'%',colX[4]+colW[4]/2,y+rowH/2+1,{align:'center'});
      // Acción correctiva
      setClr(...dark); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
      const actionLines=doc.splitTextToSize(obs.action,colW[5]-3);
      txt(actionLines.slice(0,rowH>10?3:2).join('\n'),colX[5]+1,y+3.5);
      // Responsable y Fecha (líneas en blanco para llenar)
      setDraw(...border);
      doc.line(colX[6]+2,y+rowH-3,colX[6]+colW[6]-3,y+rowH-3);
      doc.line(colX[7]+2,y+rowH-3,colX[7]+colW[7]-3,y+rowH-3);
      y+=rowH;
    });

    // Firma y aprobación
    y+=8;
    if(y>H-30){doc.addPage();y=M;}
    setDraw(...border); doc.line(M,y,W-M,y); y+=6;
    setClr(...dark); doc.setFontSize(8); doc.setFont('helvetica','bold');
    txt('Aprobación del informe',M,y); y+=7;
    const sw=(CW-12)/3;
    ['Gerente de Postventa','Supervisor de Taller','Inspector de Calidad'].forEach((l,i)=>{
      const sx=M+i*(sw+6);
      setFill(...lgray); setDraw(...border); doc.rect(sx,y,sw,18,'FD');
      setClr(...gray); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
      txt(l,sx+sw/2,y+4,{align:'center'});
      doc.line(sx+3,y+14,sx+sw-3,y+14);
      doc.setFont('helvetica','normal'); txt('Nombre y firma',sx+sw/2,y+17.5,{align:'center'});
    });

    // Pie
    const pages=doc.internal.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      doc.setPage(i);
      setClr(...gray); doc.setFontSize(6); doc.setFont('helvetica','normal');
      txt(`CheckPit — Informe de Planes de Acción — ${tallerName||''}`,M,H-4);
      txt(`Página ${i} de ${pages}`,W-M,H-4,{align:'right'});
    }
    doc.save(`CheckPit_PlanAccion_${new Date().toISOString().slice(0,10)}.pdf`);
    return true;
  }catch(e){console.error('PDF plan:',e);return false;}
}

// PARTE 7B — PANTALLA: INFORME CON PLANES DE ACCIÓN
// ══════════════════════════════════════════════════════════════════════════
function ActionPlanScreen({onBack}){
  const[dateFilter,setDateFilter]=useState("mes");
  const[customFrom,setCustomFrom]=useState("");
  const[customTo,setCustomTo]=useState(TODAY);
  const[showCustom,setShowCustom]=useState(false);
  const[pdfState,setPdfState]=useState("idle");
  const[editedActions,setEditedActions]=useState({});

  const allRecords=useMemo(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem("cp_inspections")||"[]");
      const savedOTs=new Set(saved.map(r=>r.ot));
      return [...saved,...MOCK.filter(r=>!savedOTs.has(r.ot))];
    }catch{return MOCK;}
  },[]);

  const dateMatch=useMemo(()=>{
    if(dateFilter==="semana") return d=>d>="2026-05-17";
    if(dateFilter==="mes")    return d=>d>="2026-05-01";
    if(dateFilter==="custom") return d=>(!customFrom||d>=customFrom)&&(!customTo||d<=customTo);
    return ()=>true;
  },[dateFilter,customFrom,customTo]);

  const filtered=useMemo(()=>allRecords.filter(r=>dateMatch(r.date)),[allRecords,dateMatch]);

  // Calcular frecuencias de NOs
  const obsItems=useMemo(()=>{
    const counts={};
    filtered.forEach(r=>(r.nos||[]).forEach(id=>{counts[id]=(counts[id]||0)+1;}));
    return Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,10)
      .map(([id,n])=>{
        const pos=POSITIONS.find(p=>p.items.some(it=>it.id===id));
        return{
          id,n,
          label:ITEM_LABELS[id]||id,
          action:CORRECTIVE_ACTIONS[id]||"Revisar procedimiento y capacitar al equipo técnico.",
          posId:pos?.id||0,
          posName:pos?.name||"—",
          posColor:pos?.color||C.textLt,
          posLight:pos?.light||C.surface,
          pct:filtered.length?Math.round(n/filtered.length*100):0,
        };
      });
  },[filtered]);

  const periodLabel=dateFilter==="semana"?"Esta semana":dateFilter==="mes"?"Este mes":dateFilter==="custom"&&(customFrom||customTo)?`${customFrom||"..."} → ${customTo||"..."}` :"Todos los registros";

  const handlePDF=()=>{
    if(!window.jspdf){setPdfState("error");return;}
    setPdfState("loading");
    // Pasar acciones editadas al PDF
    const itemsWithEdits=obsItems.map(obs=>({...obs,action:getAction(obs.id)}));
    setTimeout(()=>{
      const ok=generateActionPlanPDF(itemsWithEdits,filtered.length,periodLabel,getTallerName());
      setPdfState(ok?"done":"error");
      setTimeout(()=>setPdfState("idle"),3000);
    },80);
  };

  const posRGBmap={1:C.purple,2:C.green,3:C.amber,4:C.blue,5:C.teal,6:C.amber};
  const getAction=(id)=>editedActions[id]!==undefined?editedActions[id]:(CORRECTIVE_ACTIONS[id]||"Revisar procedimiento y capacitar al equipo técnico.");
  const setAction=(id,val)=>setEditedActions(p=>({...p,[id]:val}));

  return(
    <div style={{minHeight:"100vh",background:C.surface,paddingBottom:32}}>
      <div style={{background:C.navy,padding:"0 18px"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 0 14px"}}>
          <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",padding:4,flexShrink:0}}>
            <Icon n="arrowL" size={22} color="rgba(255,255,255,0.7)"/>
          </button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:C.white}}>Informe con planes de acción</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:1}}>Top no conformidades del período</div>
          </div>
        </div>
        <div style={{height:2,background:C.green,opacity:0.6}}/>
      </div>

      <div style={{padding:"16px"}}>
        {/* Filtro de período */}
        <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.textLt,letterSpacing:1.2,textTransform:"uppercase",marginBottom:10}}>Período del informe</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {[{k:"semana",l:"Esta semana"},{k:"mes",l:"Este mes"},{k:"todo",l:"Todo"},{k:"custom",l:"Personalizado"}].map(({k,l})=>{

                {/* Header del ítem */}

                  <div style={{width:26,height:26,borderRadius:7,background:obs.posColor,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:12,fontWeight:800,color:C.white}}>{i+1}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{obs.label}</div>
                    <div style={{fontSize:11,color:C.textLt,marginTop:1}}>{obs.posName}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:18,fontWeight:800,color:C.red,lineHeight:1}}>{obs.n}x</div>
                    <div style={{fontSize:10,color:C.textLt,marginTop:1}}>{obs.pct}% de inspecciones</div>
                  </div>
                </div>
                {/* Barra de frecuencia */}
                <div style={{height:3,background:C.surface}}>
                  <div style={{height:3,width:`${Math.min(obs.pct*2,100)}%`,background:C.red,transition:"width 0.4s"}}/>
                </div>
                {/* Acción correctiva — editable */}
                <div style={{padding:"12px 14px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.textLt,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span>Acción correctiva propuesta</span>
                    <span style={{fontSize:9,color:C.textLt,fontWeight:400,fontStyle:"italic"}}>editable</span>
                  </div>
                  <textarea
                    value={getAction(obs.id)}
                    onChange={e=>setAction(obs.id,e.target.value)}
                    rows={3}
                    style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:8,padding:"10px 12px",fontSize:13,color:C.text,lineHeight:1.6,fontFamily:"inherit",background:C.surface,outline:"none",resize:"vertical",boxSizing:"border-box"}}
                  />
                </div>
              </div>
            ))}
          </>
        )}

        {/* Botón generar PDF */}
        {obsItems.length>0&&(
          <button onClick={handlePDF} disabled={pdfState==="loading"}
            style={{width:"100%",padding:"15px",borderRadius:12,border:"none",
              background:pdfState==="done"?C.greenDk:pdfState==="error"?C.red:C.navy,
              color:C.white,fontSize:15,fontWeight:700,cursor:pdfState==="loading"?"default":"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"background 0.2s",marginTop:4}}>
            {pdfState==="loading"?<><Icon n="file" size={18} color="rgba(255,255,255,0.6)"/>Generando informe…</>
             :pdfState==="done"?<><Icon n="check" size={18} color={C.white}/>Informe descargado</>
             :pdfState==="error"?<><Icon n="close" size={18} color={C.white}/>Error al generar</>
             :<><Icon n="file" size={18} color={C.green}/>Generar PDF del informe</>}
          </button>
        )}
      </div>
    </div>
  );
}

// Botón reutilizable de backup Excel
function ExcelBackupBtn(){
  const[st,setSt]=useState("idle");
  const handle=()=>{
        setSt("loading");
    setTimeout(()=>{
      try{
        const saved=JSON.parse(localStorage.getItem("cp_inspections")||"[]");
        const savedOTs=new Set(saved.map(r=>r.ot));
        const all=[...saved,...MOCK.filter(r=>!savedOTs.has(r.ot))].sort((a,b)=>b.date.localeCompare(a.date));
        const ok=exportToExcel(all);
        setSt(ok?"done":"error");
      }catch{setSt("error");}
      setTimeout(()=>setSt("idle"),3000);
    },80);
  };
  return(
    <button onClick={handle} disabled={st==="loading"} style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${st==="done"?C.green:st==="error"?C.red:C.border}`,background:st==="done"?C.greenLt:st==="error"?C.redLt:C.white,color:st==="done"?C.greenXdk:st==="error"?C.red:C.textMd,fontSize:14,fontWeight:600,cursor:st==="loading"?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.2s",marginBottom:10}}>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M8 13h8M8 17h5"/></svg>
      {st==="loading"?"Generando Excel…":st==="done"?"Backup descargado correctamente":st==="error"?"Error al exportar":"Exportar historial en Excel (.xlsx)"}
    </button>
  );
}

function SettingsScreen({onBack,licenseInfo}){

          <div style={{fontSize:16,fontWeight:700,color:C.white}}>Ajustes del taller</div>

      </div>

function BottomNav({active,onInspection,onHistory,onSettings}){
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"8px 0 16px",maxWidth:480,margin:"0 auto"}}>
      {[{n:"car",l:"Inspección",k:"home",a:onInspection},{n:"history",l:"Historial",k:"history",a:onHistory},{n:"settings",l:"Ajustes",k:"settings",a:onSettings}].map(({n,l,k,a})=>(
        <button key={k} onClick={a} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0"}}>
          <Icon n={n} size={22} color={active===k?C.green:C.textLt}/>
          <span style={{fontSize:10,color:active===k?C.green:C.textLt,fontWeight:active===k?700:400}}>{l}</span>
        </button>
      ))}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[phase,setPhase]=useState("splash");
  const[licenseInfo,setLicenseInfo]=useState(null);
  const[inspection,setInspection]=useState(null);
  const[selectedRecord,setSelectedRecord]=useState(null);
  const[refreshKey,setRefreshKey]=useState(0);

  useEffect(()=>{
    const saved=localStorage.getItem("cp_license");
    if(saved&&LICENSE_RULES[saved]){setLicenseInfo(LICENSE_RULES[saved]);setPhase("home");}
  },[]);

  const goHome=()=>{setRefreshKey(k=>k+1);setPhase("home");};

  if(phase==="splash")        return <Splash onDone={()=>setPhase("activation")}/>;
  if(phase==="activation")    return <Activation onActivate={(c,r)=>{setLicenseInfo(r);setPhase("home");}}/>;
  if(phase==="newInspection") return <NewInspection onBack={goHome} onStart={data=>{setInspection({vehicle:data});setPhase("checklist");}}/>;
  if(phase==="checklist"&&inspection) return <ChecklistScreen inspection={inspection} onBack={goHome} onFinish={result=>{setInspection(result);setPhase("result");}}/>;
  if(phase==="result"&&inspection)    return <ResultScreen inspection={inspection} onHome={goHome} onNewInspection={()=>setPhase("newInspection")} licenseInfo={licenseInfo}/>;;
  if(phase==="detail"&&selectedRecord) return <InspectionDetail record={selectedRecord} onBack={goHome} licenseInfo={licenseInfo}/>;

  return(
    <div style={{maxWidth:480,margin:"0 auto"}}>
      {phase==="home"&&<>
        <Home
          licenseInfo={licenseInfo}
          refreshKey={refreshKey}
          onNewInspection={()=>setPhase("newInspection")}
          onHistory={()=>setPhase("history")}
          onSettings={()=>setPhase("settings")}
          onViewDetail={r=>{setSelectedRecord(r);setPhase("detail");}}
          onActionPlan={()=>setPhase("actionPlan")}
        />
        <BottomNav active="home" onInspection={()=>setPhase("newInspection")} onHistory={()=>setPhase("history")} onSettings={()=>setPhase("settings")}/>
      </>}
      {phase==="history"&&<HistoryScreen onBack={goHome} onViewDetail={r=>{setSelectedRecord(r);setPhase("detail");}} licenseInfo={licenseInfo}/>}
      {phase==="settings"&&<SettingsScreen onBack={goHome} licenseInfo={licenseInfo}/>}
      {phase==="actionPlan"&&<ActionPlanScreen onBack={goHome}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// ── REGISTRO DEL SERVICE WORKER ──────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[CheckPit] SW registrado:', reg.scope);
        // Detectar actualización disponible
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              // Notificar al usuario que hay una actualización
              window.__cpUpdateAvailable = true;
            }
          });
        });
      })
      .catch(err => console.warn('[CheckPit] SW error:', err));
  });
}

// ── BANNER DE INSTALACIÓN ─────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Mostrar banner personalizado después de 3 segundos
  setTimeout(() => {
    const banner = document.getElementById('cp-install-banner');
    if(banner) banner.style.display = 'flex';
  }, 3000);
});

window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('cp-install-banner');
  if(banner) banner.style.display = 'none';
  deferredPrompt = null;
  console.log('[CheckPit] App instalada correctamente');
});

function cpInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(c => {
    deferredPrompt = null;
    document.getElementById('cp-install-banner').style.display = 'none';
  });
}
function cpDismissBanner(){
  document.getElementById('cp-install-banner').style.display = 'none';
}
</script>
